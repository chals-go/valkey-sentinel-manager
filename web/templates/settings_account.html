{{ define "settings-account-content" }}
<div class="mb-8">
  <h1 class="text-2xl font-bold text-slate-900">{{ t "account_mgmt" }}</h1>
  <p class="text-sm text-slate-500 mt-1">{{ t "account_desc" }}</p>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
  <div class="p-6">
    {{ if and .Data .Data.IsDefaultPassword }}
    <div class="mb-5 px-4 py-3 rounded-xl text-sm bg-red-50 text-red-700 border border-red-200">{{ t "default_pw_warning" }}</div>
    {{ end }}
    <form method="post" action="/admin/settings/account" class="max-w-md">
      <input type="hidden" name="csrf_token" value="{{ csrfToken }}">
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">{{ t "current_password" }}</label>
        <input type="password" name="current_password" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">{{ t "new_password" }}</label>
        <input type="password" name="new_password" required minlength="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-1">{{ t "confirm_password" }}</label>
        <input type="password" name="confirm_password" required minlength="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
      </div>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700">{{ t "change_password" }}</button>
    </form>
  </div>
</div>
{{ end }}
